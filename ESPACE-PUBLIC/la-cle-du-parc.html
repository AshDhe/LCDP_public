<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>Le club - La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Découvrir La Clé du Parc, le club de parcs privés pour se ressourcer seul ou en petit groupe.">

  <script src="../config.js"></script>

  <script>
    window.SITE_BASE =
      window.SITE_CONFIG?.publicBaseUrl ||
      window.SITE_CONFIG?.siteBase ||
      "";
  </script>

  <link rel="stylesheet" href="../OBJET/CSSBASE/cssbase.css" data-site-href="/OBJET/CSSBASE/cssbase.css">

  <link rel="stylesheet" href="../OBJET/BOX/02-box-bandeau-nav.css" data-site-href="/OBJET/BOX/02-box-bandeau-nav.css">
  <link rel="stylesheet" href="../OBJET/BOX/02-box-menu-burger.css" data-site-href="/OBJET/BOX/02-box-menu-burger.css">
  <link rel="stylesheet" href="../OBJET/BOX/01-box-text.css" data-site-href="/OBJET/BOX/01-box-text.css">
  <link rel="stylesheet" href="../OBJET/BOX/01-box-carrousel.css" data-site-href="/OBJET/BOX/01-box-carrousel.css">
  <link rel="stylesheet" href="../OBJET/BOX/02-box-dialogue-bouton.css" data-site-href="/OBJET/BOX/02-box-dialogue-bouton.css">
  <link rel="stylesheet" href="../OBJET/BOX/02-box-footer.css" data-site-href="/OBJET/BOX/02-box-footer.css">
</head>

<body>
  <div class="lcdp-site-page">

    <div id="lcdp-bandeau-slot"></div>

    <main class="lcdp-site-main">
      <section class="lcdp-page-section">
        <div class="lcdp-page-container">
          <div class="lcdp-page-content lcdp-stack-large">

            <h1 class="lcdp-title-page-center">La Clé du Parc</h1>

            <div id="lcdp-boxtext-intro-slot"></div>
            <div id="lcdp-boxtext-esprit-slot"></div>
            <div id="lcdp-boxtext-usage-slot"></div>

            <div id="lcdp-carrousel-ambiance-slot"></div>

            <div id="lcdp-menu-bouton-invitation-slot"></div>

            <div id="lcdp-boxtext-activites-slot"></div>
            <div id="lcdp-boxtext-rythme-slot"></div>
            <div id="lcdp-boxtext-acces-slot"></div>

            <div id="lcdp-menu-bouton-contact-slot"></div>

            <div id="lcdp-carrousel-fin-slot"></div>

          </div>
        </div>
      </section>
    </main>

    <div id="lcdp-footer-slot"></div>
    <div id="lcdp-lightbox-slot"></div>

  </div>

  <script>
    (() => {
      "use strict";

      const siteBase = (
        window.SITE_BASE ||
        window.SITE_CONFIG?.publicBaseUrl ||
        window.SITE_CONFIG?.siteBase ||
        ""
      ).replace(/\/$/, "");

      function construireUrlSite(chemin) {
        if (!chemin) return chemin;

        if (
          chemin.startsWith("#") ||
          chemin.startsWith("mailto:") ||
          chemin.startsWith("tel:") ||
          chemin.startsWith("http://") ||
          chemin.startsWith("https://") ||
          chemin.startsWith("data:")
        ) {
          return chemin;
        }

        if (siteBase) {
          return chemin.startsWith("/")
            ? siteBase + chemin
            : siteBase + "/" + chemin.replace(/^\.\//, "");
        }

        return chemin.startsWith("/") ? ".." + chemin : chemin;
      }

      function appliquerRoutesSite(racine = document) {
        racine.querySelectorAll("[data-site-href]").forEach((element) => {
          element.setAttribute("href", construireUrlSite(element.dataset.siteHref));
        });

        racine.querySelectorAll("[data-site-src]").forEach((element) => {
          element.setAttribute("src", construireUrlSite(element.dataset.siteSrc));
        });
      }

      async function chargerFragment(chemin) {
        const reponse = await fetch(construireUrlSite(chemin), {
          method: "GET",
          credentials: "same-origin",
          cache: "force-cache"
        });

        if (!reponse.ok) {
          throw new Error("Fragment introuvable : " + chemin);
        }

        const html = await reponse.text();
        const template = document.createElement("template");
        template.innerHTML = html.trim();

        return template.content.cloneNode(true);
      }

      function chargerScriptUneFois(chemin) {
        const src = construireUrlSite(chemin);

        if (document.querySelector(`script[data-lcdp-script="${chemin}"]`)) {
          return Promise.resolve();
        }

        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.defer = true;
          script.dataset.lcdpScript = chemin;
          script.onload = resolve;
          script.onerror = () => reject(new Error("Script introuvable : " + chemin));
          document.body.appendChild(script);
        });
      }

      async function afficherDialogueMonCompte() {
        const slot = document.getElementById("lcdp-lightbox-slot");
        slot.innerHTML = "";

        const fragment = await chargerFragment("/OBJET/BOX/02-box-dialogue-bouton.html");
        slot.appendChild(fragment);

        const dialogue = slot.querySelector("[data-lcdp-box-dialogue-bouton]");

        dialogue.querySelector("[data-lcdp-dialogue-title]").textContent = "Mon compte";
        dialogue.querySelector("[data-lcdp-dialogue-text]").textContent =
          "Choisissez l’espace de connexion adapté à votre situation.";

        const actions = dialogue.querySelector("[data-lcdp-dialogue-actions]");

        const boutons = [
          {
            label: "Me connecter",
            href: "/ESPACE-PUBLIC/connexion.html",
            style: "lcdp-button-primary"
          },
          {
            label: "Être invité(e)",
            href: "/ESPACE-PUBLIC/inscription.html",
            style: "lcdp-button-secondary"
          }
        ];

        boutons.forEach((bouton) => {
          const lien = document.createElement("a");
          lien.className = "lcdp-button " + bouton.style;
          lien.textContent = bouton.label;
          lien.href = construireUrlSite(bouton.href);
          actions.appendChild(lien);
        });

        const fermer = () => {
          slot.innerHTML = "";
        };

        dialogue.querySelector("[data-lcdp-dialogue-close]").addEventListener("click", fermer);

        dialogue.addEventListener("click", (event) => {
          if (event.target === dialogue) {
            fermer();
          }
        });
      }

      window.LCDP_ouvrirDialogueMonCompte = afficherDialogueMonCompte;

      document.addEventListener("lcdp:ouvrir-dialogue-mon-compte", () => {
        afficherDialogueMonCompte().catch(console.error);
      });

      async function initialiserBandeau() {
        const slot = document.getElementById("lcdp-bandeau-slot");
        slot.innerHTML = "";

        const bandeau = await chargerFragment("/OBJET/BOX/02-box-bandeau-nav.html");
        slot.appendChild(bandeau);

        appliquerRoutesSite(slot);

        await chargerScriptUneFois("/ESPACE-PUBLIC/box-menu-burger-public.js");

        if (typeof window.LCDP_initialiserMenuBurgerPublic === "function") {
          await window.LCDP_initialiserMenuBurgerPublic();
        }
      }

      async function ajouterBoxText(slotId, titre, contenuHtml) {
        const slot = document.getElementById(slotId);
        slot.innerHTML = "";

        const fragment = await chargerFragment("/OBJET/BOX/01-box-text.html");
        slot.appendChild(fragment);

        const box = slot.querySelector("[data-lcdp-boxtext]");
        box.querySelector("[data-lcdp-boxtext-title]").textContent = titre;
        box.querySelector("[data-lcdp-boxtext-content]").innerHTML = contenuHtml;

        appliquerRoutesSite(slot);
      }

      async function ajouterCarrousel(slotId, titre, images) {
        const slot = document.getElementById(slotId);
        slot.innerHTML = "";

        const fragment = await chargerFragment("/OBJET/BOX/01-box-carrousel.html");
        slot.appendChild(fragment);

        const carrousel = slot.querySelector("[data-lcdp-box-carousel]");
        carrousel.querySelector("[data-lcdp-carousel-title]").textContent = titre;

        const liste = carrousel.querySelector("[data-lcdp-carousel-list]");

        if (Array.isArray(images)) {
          images.forEach((image) => {
            const figure = document.createElement("figure");
            figure.className = "lcdp-box-carousel__item";

            const img = document.createElement("img");
            img.className = "lcdp-box-carousel__image";
            img.src = construireUrlSite(image.src);
            img.alt = image.alt || "";
            img.loading = "lazy";
            img.decoding = "async";

            figure.appendChild(img);
            liste.appendChild(figure);
          });
        }

        if (typeof window.LCDP_initialiserCarrousels === "function") {
          window.LCDP_initialiserCarrousels(slot);
        }
      }

      async function ajouterMenuBoutonSimple(slotId, label, href, style) {
        const slot = document.getElementById(slotId);
        slot.innerHTML = "";

        const fragment = await chargerFragment("/OBJET/BOX/02-box-menu-bouton.html");
        slot.appendChild(fragment);

        const liste = slot.querySelector("[data-lcdp-menu-bouton-list]");
        liste.classList.add("lcdp-box-menu-bouton__list--single");

        const lien = document.createElement("a");
        lien.className = "lcdp-button " + style;
        lien.textContent = label;
        lien.href = construireUrlSite(href);

        liste.appendChild(lien);
      }

      async function initialiserFooter() {
        const slot = document.getElementById("lcdp-footer-slot");
        slot.innerHTML = "";

        const footer = await chargerFragment("/OBJET/BOX/02-box-footer.html");
        slot.appendChild(footer);

        appliquerRoutesSite(slot);
      }

      async function initialiserPage() {
        appliquerRoutesSite(document);

        await chargerScriptUneFois("/OBJET/BOX/01-box-carrousel.js");
        await initialiserBandeau();

        await ajouterBoxText(
          "lcdp-boxtext-intro-slot",
          "Lorem ipsum dolor sit amet",
          "<p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Integer posuere, lorem vitae placerat tempor, lectus neque fermentum arcu, vitae luctus sem justo sed libero.</p><p>Praesent sed lacus sed lorem consequat posuere. Donec euismod, mi sed consequat hendrerit, turpis purus elementum risus, vitae finibus purus velit non nibh. Exemple de <a class='lcdp-link-secondary' href='#lcdp-carrousel-ambiance-slot'>lien interne secondaire</a> dans le texte.</p>"
        );

        await ajouterBoxText(
          "lcdp-boxtext-esprit-slot",
          "Vestibulum ante ipsum primis",
          "<p>Vestibulum ante ipsum primis in faucibus orci luctus et ultrices posuere cubilia curae. Suspendisse potenti. Aenean mattis felis sed lectus vehicula, sed cursus lacus elementum.</p><p>Morbi vitae erat ac lacus blandit commodo. Proin a sem sit amet tortor consequat luctus. Autre exemple de <a class='lcdp-link-secondary' href='#lcdp-menu-bouton-invitation-slot'>lien secondaire vers un bouton</a>.</p>"
        );

        await ajouterBoxText(
          "lcdp-boxtext-usage-slot",
          "Aliquam erat volutpat",
          "<p>Aliquam erat volutpat. Donec facilisis, libero nec convallis dignissim, justo neque porttitor nulla, sit amet ullamcorper risus neque sed arcu.</p><p>Sed laoreet lorem a nulla convallis, nec interdum erat sollicitudin. Cras porta, mauris vel faucibus sagittis, lectus urna tempor urna, in porttitor sem mi sit amet est.</p>"
        );

        await ajouterCarrousel(
          "lcdp-carrousel-ambiance-slot",
          "Lorem ipsum en images",
          []
        );

        await ajouterMenuBoutonSimple(
          "lcdp-menu-bouton-invitation-slot",
          "Découvrir l’invitation",
          "/ESPACE-PUBLIC/inscription.html",
          "lcdp-button-orange"
        );

        await ajouterBoxText(
          "lcdp-boxtext-activites-slot",
          "Curabitur vitae lorem",
          "<p>Curabitur vitae lorem sit amet lacus posuere vestibulum. Mauris euismod mi a turpis varius, sed aliquet dolor ullamcorper. Nulla facilisi.</p><p>Nam sed neque non enim malesuada feugiat. Integer dignissim nisl non sapien hendrerit, non fermentum massa congue.</p>"
        );

        await ajouterBoxText(
          "lcdp-boxtext-rythme-slot",
          "Mauris luctus tempor",
          "<p>Mauris luctus tempor velit, eget tincidunt quam tempor non. Vivamus imperdiet, ex id viverra malesuada, erat sapien porttitor purus, non fermentum enim erat vitae lectus.</p><p>Ut laoreet, nunc vitae efficitur consequat, lorem tellus finibus lectus, a pulvinar odio lorem sed orci. Lien vers le <a class='lcdp-link-secondary' href='#lcdp-carrousel-fin-slot'>carrousel final</a>.</p>"
        );

        await ajouterBoxText(
          "lcdp-boxtext-acces-slot",
          "Donec non magna",
          "<p>Donec non magna in nisi vehicula sagittis. Integer ut ligula nec sem porttitor porttitor. Suspendisse faucibus, magna in tincidunt dignissim, enim ipsum tristique nunc, non viverra massa purus sed nisl.</p><p>Fusce gravida, nibh sed blandit pulvinar, enim erat suscipit lorem, sed bibendum enim orci vitae justo.</p>"
        );

        await ajouterMenuBoutonSimple(
          "lcdp-menu-bouton-contact-slot",
          "Nous contacter",
          "/ESPACE-PUBLIC/contact.html",
          "lcdp-button-secondary"
        );

        await ajouterCarrousel(
          "lcdp-carrousel-fin-slot",
          "Dernier carrousel lorem ipsum",
          []
        );

        await initialiserFooter();
      }

      initialiserPage().catch((erreur) => {
        console.error(erreur);
      });
    })();
  </script>
</body>
</html>
