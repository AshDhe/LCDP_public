<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>Connexion membre - La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Connexion à votre compte membre La Clé du Parc.">

  <script src="../config.js"></script>

  <script>
    window.SITE_BASE =
      window.SITE_CONFIG?.publicBaseUrl ||
      window.SITE_CONFIG?.siteBase ||
      "";
  </script>

  <link rel="stylesheet" href="../OBJET/CSSBASE/cssbase.css" data-site-href="/OBJET/CSSBASE/cssbase.css">
  <link rel="stylesheet" href="../OBJET/BOX/02-box-bandeau-nav.css" data-site-href="/OBJET/BOX/02-box-bandeau-nav.css">
  <link rel="stylesheet" href="../OBJET/BOX/02-box-menu-burger.css" data-site-href="/OBJET/BOX/02-box-menu-burger.css">
  <link rel="stylesheet" href="../OBJET/BOX/02-box-alerte.css" data-site-href="/OBJET/BOX/02-box-alerte.css">
  <link rel="stylesheet" href="../OBJET/BOX/02-box-dialogue-bouton.css" data-site-href="/OBJET/BOX/02-box-dialogue-bouton.css">
  <link rel="stylesheet" href="../OBJET/BOX/02-box-footer.css" data-site-href="/OBJET/BOX/02-box-footer.css">
  <link rel="stylesheet" href="../OBJET/BOX/03-box-formulaire.css" data-site-href="/OBJET/BOX/03-box-formulaire.css">
  <link rel="stylesheet" href="../OBJET/BOX/03-box-champ-formulaire.css" data-site-href="/OBJET/BOX/03-box-champ-formulaire.css">
</head>

<body>
  <div class="lcdp-site-page">

    <div id="lcdp-bandeau-slot"></div>

    <main class="lcdp-site-main">
      <section
        class="lcdp-page-section"
        aria-label="Connexion au compte membre"
      >
        <div class="lcdp-page-container">

          <section
            class="lcdp-component lcdp-box-formulaire-page lcdp-box-formulaire-page--compact"
            data-lcdp-box-formulaire-page
          >
            <div class="lcdp-box-formulaire-page__inner">

              <form
                id="formulaire-connexion-membre"
                class="lcdp-box-formulaire"
                novalidate
              >
                <header class="lcdp-box-formulaire__header">
                  <h1 class="lcdp-box-formulaire__title">
                    Connexion membre
                  </h1>

                  <p class="lcdp-mention-connexion">
                    [Espace membre de l'application]
                  </p>

                  <p class="lcdp-box-formulaire__subtitle">
                    Accédez à votre compte membre
                  </p>
                </header>

                <div class="lcdp-box-formulaire__fields">

                  <div class="lcdp-box-champ-formulaire">
                    
                    <div class="lcdp-box-champ-formulaire__control">
                      <input
                        type="email"
                        id="emailmembre"
                        name="emailmembre"
                        placeholder="Identifiant e-mail de votre compte membre"
                        autocomplete="username"
                        autocapitalize="none"
                        spellcheck="false"
                        required
                      >
                    </div>
                  </div>

                  <div class="lcdp-box-champ-formulaire">
                    
                    <div class="lcdp-box-champ-formulaire__control">
                      <input
                        type="password"
                        id="mdpmembre"
                        name="mdpmembre"
                        placeholder="Mot de passe de votre compte membre"
                        autocomplete="current-password"
                        required
                      >

                      <label
                        class="lcdp-box-champ-formulaire__checkbox-line"
                        for="afficher-mdp-membre"
                      >
                        <input
                          type="checkbox"
                          id="afficher-mdp-membre"
                        >
                        <span>Afficher le mot de passe</span>
                      </label>
                      <p class="lcdp-box-formulaire__note lcdp-box-formulaire__note--after-control">
                        <a
                          id="lien-mot-de-passe-oublie"
                          href="./mdp-perdu-membre.html"
                        >
                          Mot de passe perdu ?
                        </a>
                      </p>
                    </div>
                  </div>

                </div>

                  <div class="lcdp-box-formulaire__actions">
                    <button
                      type="submit"
                      id="bouton-valider-formulaire"
                      class="lcdp-button-logo"
                      aria-label="Connexion"
                      title="Connexion"
                    >
                    <img
                      class="lcdp-button-logo__image"
                      src="../OBJET/IMAG/LOGO/logo-bouton-navigation-192.webp"
                      data-site-src="/OBJET/IMAG/LOGO/logo-bouton-navigation-192.webp"
                      alt=""
                      aria-hidden="true"
                    >
                      <span class="lcdp-sr-only">Connexion</span>
                    </button>
                  </div>

              </form>

            </div>
          </section>

        </div>
      </section>
    </main>

    <div id="lcdp-footer-slot"></div>
    <div id="lcdp-lightbox-slot"></div>

  </div>

  <script>
    (() => {
      "use strict";

      const siteBase = (
        window.SITE_BASE ||
        window.SITE_CONFIG?.publicBaseUrl ||
        window.SITE_CONFIG?.siteBase ||
        ""
      ).replace(/\/$/, "");

      function construireUrlSite(chemin) {
        if (!chemin) return chemin;

        if (
          chemin.startsWith("#") ||
          chemin.startsWith("mailto:") ||
          chemin.startsWith("tel:") ||
          chemin.startsWith("http://") ||
          chemin.startsWith("https://") ||
          chemin.startsWith("data:")
        ) {
          return chemin;
        }

        if (siteBase) {
          return chemin.startsWith("/")
            ? siteBase + chemin
            : siteBase + "/" + chemin.replace(/^\.\//, "");
        }

        return chemin.startsWith("/") ? ".." + chemin : chemin;
      }

      function appliquerRoutesSite(racine = document) {
        racine.querySelectorAll("[data-site-href]").forEach((element) => {
          element.setAttribute("href", construireUrlSite(element.dataset.siteHref));
        });

        racine.querySelectorAll("[data-site-src]").forEach((element) => {
          element.setAttribute("src", construireUrlSite(element.dataset.siteSrc));
        });
      }

      window.LCDP_construireUrlSite = construireUrlSite;
      appliquerRoutesSite(document);
    })();
  </script>
  <script src="./connexion-membre.js"></script>
</body>
</html>
