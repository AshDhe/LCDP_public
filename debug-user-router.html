<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Debug user routeur</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 24px;
      color: #1f2a24;
    }

    button {
      min-height: 52px;
      padding: 12px 20px;
      border: 0;
      border-radius: 12px;
      background: #55733f;
      color: white;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
    }

    pre {
      margin-top: 24px;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 12px;
      background: #f7f7f4;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>

<body>
  <h1>Debug user routeur</h1>

  <p>
    Clique sur le bouton après t’être reconnecté comme membre.
  </p>

  <button type="button" id="tester-membre">
    Tester compte membre
  </button>

  <pre id="resultat">En attente du test...</pre>

  <script>
    const bouton = document.getElementById("tester-membre");
    const resultat = document.getElementById("resultat");

    bouton.addEventListener("click", async () => {
      resultat.textContent = "Test en cours...";

      try {
        const response = await fetch("https://user-routeur-api.lacleduparc.fr", {
          method: "POST",
          credentials: "include",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            compte: "membre"
          })
        });

        const texte = await response.text();

        resultat.textContent =
          "STATUS : " + response.status + "\n\n" +
          "REPONSE :\n" + texte;

      } catch (error) {
        resultat.textContent =
          "ERREUR FETCH :\n" + error.message;
      }
    });
  </script>
</body>
</html>
