<div class="lcdp-box-card-listinvites-oui-non" data-lcdp-box-card-listinvites-oui-non role="dialog" aria-modal="true" aria-labelledby="lcdp-listinvites-title">
  <article class="lcdp-box-card-listinvites-oui-non__card">
    <button class="lcdp-box-card-listinvites-oui-non__close" type="button" data-lcdp-listinvites-close aria-label="Fermer">×</button>

    <header class="lcdp-box-card-listinvites-oui-non__header">
      <p class="lcdp-box-card-listinvites-oui-non__eyebrow">Réservation</p>
      <h2 class="lcdp-box-card-listinvites-oui-non__title" id="lcdp-listinvites-title" data-lcdp-listinvites-title>Invité(s)</h2>
    </header>

    <p class="lcdp-box-card-listinvites-oui-non__message" data-lcdp-listinvites-message hidden></p>

    <ul class="lcdp-box-card-listinvites-oui-non__list" data-lcdp-listinvites-list></ul>

    <section class="lcdp-box-card-listinvites-oui-non__ajout" data-lcdp-listinvites-ajout>
      <p class="lcdp-box-card-listinvites-oui-non__ajout-title">Ajouter un invité</p>
      <ul class="lcdp-box-card-listinvites-oui-non__emails" data-lcdp-listinvites-emails></ul>
      <button class="lcdp-button lcdp-button-secondary" type="button" data-lcdp-listinvites-add-email>Ajouter un e-mail</button>
    </section>

    <div class="lcdp-box-card-listinvites-oui-non__actions">
      <button class="lcdp-button lcdp-button-primary" type="button" data-lcdp-listinvites-update>Mettre à jour</button>
      <button class="lcdp-button lcdp-button-secondary" type="button" data-lcdp-listinvites-cancel>Fermer</button>
    </div>
  </article>
</div>
