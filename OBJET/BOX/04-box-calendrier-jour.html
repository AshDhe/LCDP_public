<div class="lcdp-box-calendrier-jour" role="dialog" aria-modal="true" data-lcdp-box-calendrier-jour>
  <div class="lcdp-box-calendrier-jour__card">
    <button
      class="lcdp-box-calendrier-jour__close"
      type="button"
      aria-label="Fermer"
      data-lcdp-calendrier-jour-close
    >
      ×
    </button>

    <header class="lcdp-box-calendrier-jour__header">
      <h2 class="lcdp-box-calendrier-jour__title" data-lcdp-calendrier-jour-title>
        Votre heure d'arrivée
      </h2>

      <p class="lcdp-box-calendrier-jour__meta" data-lcdp-calendrier-jour-meta></p>
    </header>

    <section class="lcdp-box-calendrier-jour__body" aria-label="Choix de l'heure d'arrivée">
      <p class="lcdp-box-calendrier-jour__message" data-lcdp-calendrier-jour-message hidden></p>

      <div class="lcdp-box-calendrier-jour__grid" data-lcdp-calendrier-jour-grid></div>
    </section>
  </div>
</div>
