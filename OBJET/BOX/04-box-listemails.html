<div class="lcdp-box-card-listemails" role="dialog" aria-modal="true" data-lcdp-box-card-listemails>

      class="lcdp-box-card-listemails__close"
      type="button"
      aria-label="Fermer"
      data-lcdp-listemails-close
    >
      ×
    </button>

    <h2 class="lcdp-box-card-listemails__title" data-lcdp-listemails-title>
      Liste des e-mails
    </h2>

    <p class="lcdp-box-card-listemails__message" data-lcdp-listemails-message hidden></p>

    <div class="lcdp-box-card-listemails__content" data-lcdp-listemails-content>
      <ul class="lcdp-box-card-listemails__list" data-lcdp-listemails-list></ul>

    <div class="lcdp-box-card-listemails__actions" data-lcdp-listemails-actions></div>

</div>
