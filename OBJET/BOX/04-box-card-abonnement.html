<article class="lcdp-box-card-abonnement" data-lcdp-box-card-abonnement>
  <div class="lcdp-box-card-abonnement__row lcdp-box-card-abonnement__row--main">
    <div class="lcdp-box-card-abonnement__item lcdp-box-card-abonnement__item--name">
      <span class="lcdp-box-card-abonnement__label">Abonnement :</span>
      <span class="lcdp-box-card-abonnement__value" data-lcdp-card-abonnement-type></span>
      <span class="lcdp-box-card-abonnement__mention" data-lcdp-card-abonnement-invites hidden></span>
    </div>

    <p class="lcdp-box-card-abonnement__item lcdp-box-card-abonnement__item--date">
      <span class="lcdp-box-card-abonnement__label">Début :</span>
      <span class="lcdp-box-card-abonnement__value" data-lcdp-card-abonnement-debut></span>
    </p>
  </div>

  <div class="lcdp-box-card-abonnement__row lcdp-box-card-abonnement__row--periode">
    <div class="lcdp-box-card-abonnement__item">
      <span class="lcdp-box-card-abonnement__label">Jusqu'au :</span>
      <span class="lcdp-box-card-abonnement__value" data-lcdp-card-abonnement-fin></span>
      <span class="lcdp-box-card-abonnement__suffix">inclus</span>
      <span class="lcdp-box-card-abonnement__mention" data-lcdp-card-abonnement-suspension hidden></span>
    </div>

    <div class="lcdp-box-card-abonnement__actions">
      <button
        class="lcdp-box-card-abonnement__micro-action lcdp-box-card-abonnement__micro-action--alerte"
        type="button"
        data-action="payer-abonnement"
        hidden
      >
        Non payé
      </button>

      <button
        class="lcdp-box-card-abonnement__micro-action"
        type="button"
        data-action="prolonger-abonnement"
      >
        Prolonger
      </button>
    </div>
  </div>

  <div class="lcdp-box-card-abonnement__row">
    <div class="lcdp-box-card-abonnement__item lcdp-box-card-abonnement__item--commande">
      <span class="lcdp-box-card-abonnement__label">Numéro de commande :</span>
      <span class="lcdp-box-card-abonnement__value" data-lcdp-card-abonnement-orderid></span>
      <span class="lcdp-box-card-abonnement__mention" data-lcdp-card-abonnement-prix-paiement></span>
      <span class="lcdp-box-card-abonnement__mention" data-lcdp-card-abonnement-code-remise hidden></span>
    </div>

    <div class="lcdp-box-card-abonnement__actions">
      <button
        class="lcdp-box-card-abonnement__micro-action"
        type="button"
        data-action="voir-facture"
      >
        Facture
      </button>

      <button
        class="lcdp-box-card-abonnement__micro-action"
        type="button"
        data-action="demander-avoir"
        data-lcdp-card-abonnement-avoir
      >
        Avoir
      </button>
    </div>
  </div>

  <div class="lcdp-box-card-abonnement__row lcdp-box-card-abonnement__row--links">
    <a
      class="lcdp-link-secondary"
      href="../ESPACE-PUBLIC/reglement-club.html"
      data-site-href="/ESPACE-PUBLIC/reglement-club.html"
      data-space="public"
      target="_blank"
      rel="noopener noreferrer"
    >
      Règlement du club
    </a>

    <a
      class="lcdp-link-secondary"
      href="../ESPACE-PUBLIC/reglement-app.html"
      data-site-href="/ESPACE-PUBLIC/reglement-app.html"
      data-space="public"
      target="_blank"
      rel="noopener noreferrer"
    >
      Règlement de l'application
    </a>
  </div>
</article>
