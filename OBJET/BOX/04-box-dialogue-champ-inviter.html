<div class="lcdp-box-dialogue-champ-inviter" role="dialog" aria-modal="true" data-lcdp-box-dialogue-champ-inviter>
  <div class="lcdp-box-dialogue-champ-inviter__card">
    <button
      class="lcdp-box-dialogue-champ-inviter__close"
      type="button"
      aria-label="Fermer"
      data-lcdp-inviter-close
    >
      ×
    </button>

    <h2 class="lcdp-box-dialogue-champ-inviter__title" data-lcdp-inviter-title>
      Inviter un membre
    </h2>

    <p class="lcdp-box-dialogue-champ-inviter__text" data-lcdp-inviter-text>
      Saisissez l’adresse e-mail du membre à inviter.
    </p>

    <form class="lcdp-box-dialogue-champ-inviter__form" data-lcdp-inviter-form novalidate>
      <div class="lcdp-box-dialogue-champ-inviter__fields" data-lcdp-inviter-fields></div>

      <p class="lcdp-box-dialogue-champ-inviter__error" data-lcdp-inviter-error hidden></p>

      <div class="lcdp-box-dialogue-champ-inviter__actions">
        <button class="lcdp-button lcdp-button-secondary" type="button" data-lcdp-inviter-add>
          Ajouter une adresse mail
        </button>

        <button class="lcdp-button lcdp-button-primary" type="submit">
          Envoyer
        </button>
      </div>
    </form>
  </div>
</div>
