<div class="lcdp-box-calendrier-an" role="dialog" aria-modal="true" data-lcdp-box-calendrier-an>
  <section class="lcdp-box-calendrier-an__card">
    <button
      class="lcdp-box-calendrier-an__close"
      type="button"
      aria-label="Fermer"
      data-lcdp-calendrier-an-close
    >
      ×
    </button>

    <header class="lcdp-box-calendrier-an__header">
      <h2 class="lcdp-box-calendrier-an__title" data-lcdp-calendrier-an-title>
        Début du nouvel abonnement
      </h2>
      <p class="lcdp-box-calendrier-an__meta" data-lcdp-calendrier-an-meta></p>
    </header>

    <p class="lcdp-box-calendrier-an__message" data-lcdp-calendrier-an-message hidden></p>

    <div class="lcdp-box-calendrier-an__years" data-lcdp-calendrier-an-years></div>

    <div class="lcdp-box-calendrier-an__actions" data-lcdp-calendrier-an-actions>
      <button class="lcdp-button lcdp-button-secondary" type="button" data-lcdp-calendrier-an-back>
        Précédent
      </button>
      <button class="lcdp-button lcdp-button-primary" type="button" data-lcdp-calendrier-an-next>
        Récapitulatif
      </button>
    </div>
  </section>
</div>
