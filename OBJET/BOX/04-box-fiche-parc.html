<div class="lcdp-box-fiche-parc" role="dialog" aria-modal="true" data-lcdp-box-fiche-parc>
  <article class="lcdp-box-fiche-parc__card">
    <button
      class="lcdp-box-fiche-parc__close"
      type="button"
      aria-label="Fermer"
      data-lcdp-fiche-parc-close
    >
      ×
    </button>

    <header class="lcdp-box-fiche-parc__header">
      <h2 class="lcdp-box-fiche-parc__title" data-lcdp-fiche-parc-title>
        Parc
      </h2>

      <div
        class="lcdp-box-fiche-parc__actions"
        data-lcdp-fiche-parc-actions
        aria-label="Actions du parc"
      ></div>
    </header>

    <section class="lcdp-box-fiche-parc__section" aria-label="Présentation du parc">
      <h3>Présentation</h3>
      <div class="lcdp-box-fiche-parc__box-text" data-lcdp-fiche-parc-presentation>
        Présentation non renseignée.
      </div>
    </section>

    <section class="lcdp-box-fiche-parc__section lcdp-box-fiche-parc__section--galerie" aria-label="Galerie photo du parc">
      <div class="lcdp-box-fiche-parc__galerie" data-lcdp-fiche-parc-galerie-slot></div>
    </section>

    <section class="lcdp-box-fiche-parc__section lcdp-box-fiche-parc__section--map" aria-label="Carte du parc">
      <div class="lcdp-box-fiche-parc__map" data-lcdp-fiche-parc-map-slot></div>
    </section>

    <section class="lcdp-box-fiche-parc__section" aria-label="Horaire d’accès La Clé du Parc">
      <h3>Horaire d’accès La Clé du Parc</h3>
      <div class="lcdp-box-fiche-parc__box-text" data-lcdp-fiche-parc-acces>
        <p>L’accès est communiqué dans votre carte de réservation associée à ce parc.</p>
      </div>
    </section>

    <section class="lcdp-box-fiche-parc__section" aria-label="Votre contact La Clé du Parc">
      <h3>Votre contact La Clé du Parc</h3>
      <div class="lcdp-box-fiche-parc__box-text" data-lcdp-fiche-parc-contact>
        Contact non renseigné.
      </div>
    </section>
  </article>
</div>
