<article class="lcdp-box-card-parc" data-lcdp-box-card-parc>
  <img
    class="lcdp-box-card-parc__image"
    src=""
    alt=""
    loading="lazy"
    decoding="async"
    data-lcdp-card-parc-image
  >

  <div class="lcdp-box-card-parc__body">
    <div class="lcdp-box-card-parc__text">
      <h3 class="lcdp-box-card-parc__title" data-lcdp-card-parc-title></h3>

      <p class="lcdp-box-card-parc__meta" data-lcdp-card-parc-meta></p>

      <p
        class="lcdp-box-card-parc__description"
        data-lcdp-card-parc-description
        hidden
      ></p>
    </div>

    <div class="lcdp-box-card-parc__actions">
      <button
        class="lcdp-button lcdp-button-secondary"
        type="button"
        data-action="ouvrir-fiche-parc"
      >
        Le parc
      </button>

      <button
        class="lcdp-button lcdp-button-primary"
        type="button"
        data-action="nouvelle-date-parc"
      >
        Nouvelle date
      </button>
    </div>
  </div>
</article>
