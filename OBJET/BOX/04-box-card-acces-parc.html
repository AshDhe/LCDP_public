<div class="lcdp-box-card-acces-parc" role="dialog" aria-modal="true" aria-label="Accès au parc" data-lcdp-box-card-acces-parc>
  <article class="lcdp-box-card-acces-parc__card">
    <button
      class="lcdp-box-card-acces-parc__close"
      type="button"
      aria-label="Fermer"
      data-lcdp-card-acces-parc-close
    >
      ×
    </button>

    <header class="lcdp-box-card-acces-parc__header">
      <h2 class="lcdp-box-card-acces-parc__title" data-lcdp-card-acces-parc-title>
        Accès au parc
      </h2>
    </header>

    <div class="lcdp-box-card-acces-parc__map" data-lcdp-card-acces-parc-map-slot></div>

    <section class="lcdp-box-card-acces-parc__bloc" aria-label="Adresse du parc">
      <h3 class="lcdp-box-card-acces-parc__bloc-title">Adresse</h3>
      <div class="lcdp-box-card-acces-parc__text" data-lcdp-card-acces-parc-adresse></div>
    </section>

    <section class="lcdp-box-card-acces-parc__bloc" aria-label="Entrée du parc">
      <h3 class="lcdp-box-card-acces-parc__bloc-title">Entrée du parc</h3>
      <p class="lcdp-box-card-acces-parc__text" data-lcdp-card-acces-parc-entree></p>
    </section>

    <section class="lcdp-box-card-acces-parc__bloc lcdp-box-card-acces-parc__bloc--acces" aria-label="Accès au parc">
      <h3 class="lcdp-box-card-acces-parc__bloc-title">Accès</h3>
      <p class="lcdp-box-card-acces-parc__text lcdp-box-card-acces-parc__text--acces">
        Photos de l’entrée du parc.
      </p>
      <div class="lcdp-box-card-acces-parc__galerie" data-lcdp-card-acces-parc-galerie-slot></div>
    </section>
  </article>
</div>
