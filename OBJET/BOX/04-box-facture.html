<div class="lcdp-box-facture" role="dialog" aria-modal="true" aria-labelledby="lcdp-facture-title" data-lcdp-box-facture>
  <section class="lcdp-box-facture__card">
    <button class="lcdp-box-facture__close" type="button" aria-label="Fermer la facture" data-lcdp-facture-close>×</button>

    <div class="lcdp-box-facture__print-zone" data-lcdp-facture-print-zone>
      <header class="lcdp-box-facture__header">
        <h2 id="lcdp-facture-title" class="lcdp-box-facture__title">FACTURE</h2>
        <p class="lcdp-box-facture__date">Date : <strong data-lcdp-facture-date>Non renseigné</strong></p>
      </header>

      <div class="lcdp-box-facture__coordonnees">
        <div data-lcdp-facture-emetteur-slot></div>
        <div data-lcdp-facture-destinataire-slot></div>
      </div>

      <div data-lcdp-facture-card-slot></div>
      <div data-lcdp-facture-mentions-slot></div>
    </div>

    <div class="lcdp-box-facture__actions lcdp-no-print">
      <button class="lcdp-button lcdp-button-primary" type="button" data-lcdp-facture-print>Imprimer / PDF</button>
    </div>
  </section>
</div>
