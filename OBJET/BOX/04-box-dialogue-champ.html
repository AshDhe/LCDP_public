<div class="lcdp-box-dialogue-champ" role="dialog" aria-modal="true" data-lcdp-box-dialogue-champ>
  <div class="lcdp-box-dialogue-champ__card">
    <button
      class="lcdp-box-dialogue-champ__close"
      type="button"
      aria-label="Fermer"
      data-lcdp-dialogue-champ-close
    >
      ×
    </button>

    <h2 class="lcdp-box-dialogue-champ__title" data-lcdp-dialogue-champ-title></h2>

    <form class="lcdp-box-dialogue-champ__form" data-lcdp-dialogue-champ-form novalidate>
      <div class="lcdp-box-dialogue-champ__content" data-lcdp-dialogue-champ-content></div>

      <p class="lcdp-box-dialogue-champ__error" data-lcdp-dialogue-champ-error hidden></p>

      <div class="lcdp-box-dialogue-champ__actions">
        <button
          class="lcdp-button lcdp-button-secondary"
          type="button"
          data-lcdp-dialogue-champ-cancel
        >
          Annuler
        </button>

        <button
          class="lcdp-button lcdp-button-primary"
          type="submit"
          data-lcdp-dialogue-champ-submit
        >
          Valider
        </button>
      </div>
    </form>
  </div>
</div>
