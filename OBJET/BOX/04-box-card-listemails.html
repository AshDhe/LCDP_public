<li class="lcdp-box-card-listemails-item" data-lcdp-box-card-listemails-item>
  <input
    class="lcdp-box-card-listemails-item__input"
    type="email"
    autocomplete="email"
    placeholder="E-mail du membre invité"
    data-lcdp-card-listemails-email
  >

  <div class="lcdp-box-card-listemails-item__actions" data-lcdp-card-listemails-actions>
    <button class="lcdp-button lcdp-button-secondary" type="button" data-lcdp-card-listemails-modifier hidden>
      Modifier
    </button>

    <button class="lcdp-button lcdp-button-secondary" type="button" data-lcdp-card-listemails-supprimer>
      Supprimer
    </button>
  </div>
</li>
