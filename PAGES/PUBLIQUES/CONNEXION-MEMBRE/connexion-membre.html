<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>Connexion membre - La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Connexion à votre compte membre La Clé du Parc.">

  <!-- SITEBASE : config.js est chargé avant les scripts métier -->
  <script src="../../../config.js"></script>

  <script>
    (() => {
      const siteRootRelative = "../../../";
      const baseDepuisChemin = new URL(siteRootRelative, window.location.href);

      let siteBaseFallback = baseDepuisChemin.pathname.replace(/\/$/, "");

      if (siteBaseFallback === "/") {
        siteBaseFallback = "";
      }

      window.SITE_ROOT_RELATIVE = siteRootRelative;

      window.SITE_BASE = (
        window.SITE_CONFIG?.publicBaseUrl ||
        window.SITE_CONFIG?.PUBLIC_BASE ||
        window.SITE_CONFIG?.siteBase ||
        siteBaseFallback ||
        ""
      ).replace(/\/$/, "");
    })();
  </script>

  <link rel="stylesheet" href="../../../OBJETS/CSS/base.css">
  <link rel="stylesheet" href="../../../OBJETS/CSS/bandeau-et-burger.css">
  <link rel="stylesheet" href="../../../OBJETS/CSS/footer.css">
  <link rel="stylesheet" href="../../../OBJETS/CSS/formulaire.css">
  <link rel="stylesheet" href="../../../OBJETS/CSS/lightbox-information.css">
</head>

<body>
  <div class="site-page">

    <div id="bandeau-nav-container">
      <header class="site-header">
        <div class="site-header-inner">
          <a
            href="../../../index.html"
            class="site-logo"
            data-site-href="/index.html"
          >
            <img
              class="site-logo-img"
              src="../../../OBJETS/IMAGES/LOGO/logo-bandeau-96.webp"
              data-site-src="/OBJETS/IMAGES/LOGO/logo-bandeau-96.webp"
              width="96"
              height="96"
              alt=""
              aria-hidden="true"
              loading="eager"
              fetchpriority="high"
              decoding="async"
            >
            <span>La Clé du Parc</span>
          </a>

          <button
            class="burger-button"
            type="button"
            aria-label="Ouvrir le menu"
            aria-expanded="false"
            aria-controls="burger-nav-public"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>

          <nav
            id="burger-nav-public"
            class="burger-nav burger-nav-public"
            aria-label="Navigation publique"
          >
            <a
              href="../../../index.html?source=menu"
              data-site-href="/index.html?source=menu"
            >Accueil</a>

            <a
              href="../../../PAGES/PUBLIQUES/CHOIX-CONNEXION/choix-connexion.html?source=menu-mon-compte"
              data-site-href="/PAGES/PUBLIQUES/CHOIX-CONNEXION/choix-connexion.html?source=menu-mon-compte"
              id="lien-mon-compte-public"
            >
              Mon compte
            </a>

            <a
              href="../../../PAGES/PUBLIQUES/ACTUALITES/actualites.html?source=menu"
              data-site-href="/PAGES/PUBLIQUES/ACTUALITES/actualites.html?source=menu"
            >Actualités</a>

            <a
              href="../../../PAGES/PUBLIQUES/INSCRIPTION-MEMBRE/inscription-membre.html?source=menu"
              data-site-href="/PAGES/PUBLIQUES/INSCRIPTION-MEMBRE/inscription-membre.html?source=menu"
            >Être invité(e)</a>

            <a
              href="../../../PAGES/PUBLIQUES/LA-CLE-DU-PARC/la-cle-du-parc.html?source=menu"
              data-site-href="/PAGES/PUBLIQUES/LA-CLE-DU-PARC/la-cle-du-parc.html?source=menu"
            >Le club</a>
          </nav>
        </div>
      </header>
    </div>

    <div id="lightbox-information-container"></div>

    <main class="site-main">

      <section class="page-section page-section-large" aria-label="Connexion au compte membre">
        <div class="page-container">
          <div class="page-content page-content-spaced">

            <h1 class="titre-formulaire">
              Connexion membre
            </h1>

            <p class="page-lead">
              Accédez à votre compte membre
            </p>

            <div class="formulaire-page">

              <form
                id="formulaire-connexion-membre"
                class="formulaire-inscription"
                novalidate
              >

                <div class="formulaire-champ">
                  <label for="emailmembre">
                    Identifiant du compte
                  </label>

                  <input
                    type="email"
                    id="emailmembre"
                    name="emailmembre"
                    placeholder="Email"
                    autocomplete="username"
                    required
                  >
                </div>

                <div class="formulaire-champ">
                  <input
                    type="password"
                    id="mdpmembre"
                    name="mdpmembre"
                    placeholder="Mot de passe"
                    autocomplete="current-password"
                    required
                  >

                  <label class="checkbox-ligne" for="afficher-mdp-membre">
                    <input
                      type="checkbox"
                      id="afficher-mdp-membre"
                    >
                    <span>Afficher le mot de passe</span>
                  </label>
                </div>

                <div class="formulaire-actions">
                  <button
                    type="submit"
                    id="bouton-valider-formulaire"
                    class="button"
                  >
                    Connexion
                  </button>
                </div>

                <div class="formulaire-actions">
                  <a
                    id="lien-mot-de-passe-oublie"
                    class="lien-action-secondaire"
                    href="../MDP-PERDU/mdp-perdu-membre.html"
                    data-site-href="/PAGES/PUBLIQUES/MDP-PERDU/mdp-perdu-membre.html"
                  >
                    Mot de passe perdu ?
                  </a>
                </div>

              </form>

            </div>

          </div>
        </div>
      </section>

    </main>

    <div id="footer-container"></div>

  </div>

  <script>
    (() => {
      const siteBase = (
        window.SITE_BASE ||
        window.SITE_CONFIG?.publicBaseUrl ||
        window.SITE_CONFIG?.PUBLIC_BASE ||
        window.SITE_CONFIG?.siteBase ||
        ""
      ).replace(/\/$/, "");

      const siteRootRelative = window.SITE_ROOT_RELATIVE || "../../../";

      function construireUrlSite(chemin) {
        if (!chemin) return chemin;

        if (
          chemin.startsWith("#") ||
          chemin.startsWith("mailto:") ||
          chemin.startsWith("tel:") ||
          chemin.startsWith("http://") ||
          chemin.startsWith("https://")
        ) {
          return chemin;
        }

        if (siteBase) {
          return chemin.startsWith("/")
            ? siteBase + chemin
            : siteBase + "/" + chemin.replace(/^\.\//, "");
        }

        return chemin.startsWith("/")
          ? siteRootRelative.replace(/\/?$/, "/") + chemin.replace(/^\//, "")
          : chemin;
      }

      function corrigerCheminsSite(scope) {
        scope.querySelectorAll("[data-site-src]").forEach((element) => {
          element.setAttribute("src", construireUrlSite(element.dataset.siteSrc));
        });

        scope.querySelectorAll("[data-site-href]").forEach((element) => {
          element.setAttribute("href", construireUrlSite(element.dataset.siteHref));
        });

        scope.querySelectorAll("a[href^='/']").forEach((element) => {
          element.setAttribute("href", construireUrlSite(element.getAttribute("href")));
        });

        scope.querySelectorAll("img[src^='/']").forEach((element) => {
          element.setAttribute("src", construireUrlSite(element.getAttribute("src")));
        });
      }

      window.construireUrlSite = construireUrlSite;

      corrigerCheminsSite(document);
    })();
  </script>

  <script src="../../../OBJETS/BLOCS/burger-public.js"></script>
  <script src="../../../OBJETS/BLOCS/footer-global.js"></script>
  <script src="../../../OBJETS/BLOCS/lightbox-information.js"></script>
  <script src="./connexion-membre.js"></script>
</body>
</html>
