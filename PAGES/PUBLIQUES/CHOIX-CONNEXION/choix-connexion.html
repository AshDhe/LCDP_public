<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>Connexion membre - La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Connexion à l'espace membre de La Clé du Parc.">

  <!-- SITEBASE : config.js est chargé avant les scripts métier -->
  <script src="../../../config.js"></script>

  <script>
    window.SITE_BASE =
      window.SITE_CONFIG?.publicBaseUrl ||
      window.SITE_CONFIG?.siteBase ||
      "";

    window.SITE_ROOT_RELATIVE = "../../../";
  </script>

  <!-- CSS communs -->
  <link rel="stylesheet" href="../../../OBJETS/CSS/base.css">
  <link rel="stylesheet" href="../../../OBJETS/CSS/bandeau-et-burger.css">
  <link rel="stylesheet" href="../../../OBJETS/CSS/footer.css">
</head>

<body>
  <div class="site-page">

    <div id="bandeau-nav-container"></div>
    <div id="lightbox-information-container"></div>

    <main class="site-main">
      <section class="page-section" aria-label="Connexion membre">
        <div class="page-container">
          <div class="page-content">

            <h1 class="site-title">
              Connexion membre
            </h1>

            <p class="site-subtitle">
              Accéder à mon compte membre.
            </p>

            <form
              id="formulaire-connexion-membre"
              novalidate
            >

              <div class="formulaire-champ">
                <label for="emailmembre">
                  Identifiant du compte membre
                </label>

                <input
                  type="email"
                  id="emailmembre"
                  name="emailmembre"
                  autocomplete="username"
                  required
                >
              </div>

              <div class="formulaire-champ">
                <label for="mdpmembre">
                  Mot de passe du compte -
                  <a
                    id="lien-mot-de-passe-oublie"
                    href="../../../PAGES/PUBLIQUES/MDP-PERDU/mdp-perdu-membre.html"
                    data-site-href="/PAGES/PUBLIQUES/MDP-PERDU/mdp-perdu-membre.html"
                  >
                    Mot de passe oublié ?
                  </a>
                </label>

                <input
                  type="password"
                  id="mdpmembre"
                  name="mdpmembre"
                  autocomplete="current-password"
                  required
                >

                <label for="afficher-mdp-membre">
                  <input
                    type="checkbox"
                    id="afficher-mdp-membre"
                  >
                  Afficher le mot de passe
                </label>
              </div>

              <p
                id="message-connexion-membre"
                aria-live="polite"
                hidden
              ></p>

              <div class="page-actions">
                <button
                  type="submit"
                  id="bouton-valider-formulaire"
                  class="button"
                >
                  Connexion
                </button>
              </div>

            </form>

          </div>
        </div>
      </section>
    </main>

    <div id="footer-container"></div>

  </div>

  <script>
    (() => {
      const siteBase = (
        window.SITE_BASE ||
        window.SITE_CONFIG?.publicBaseUrl ||
        window.SITE_CONFIG?.siteBase ||
        ""
      ).replace(/\/$/, "");

      const siteRootRelative = window.SITE_ROOT_RELATIVE || "../../../";

      function construireUrlSite(chemin) {
        if (!chemin) return chemin;

        if (
          chemin.startsWith("#") ||
          chemin.startsWith("mailto:") ||
          chemin.startsWith("tel:") ||
          chemin.startsWith("http://") ||
          chemin.startsWith("https://")
        ) {
          return chemin;
        }

        if (siteBase) {
          return chemin.startsWith("/")
            ? siteBase + chemin
            : siteBase + "/" + chemin.replace(/^\.\//, "");
        }

        return siteRootRelative.replace(/\/?$/, "/") + chemin.replace(/^\//, "");
      }

      window.construireUrlSite = construireUrlSite;

      document.querySelectorAll("[data-site-src]").forEach((element) => {
        element.setAttribute("src", construireUrlSite(element.dataset.siteSrc));
      });

      document.querySelectorAll("[data-site-href]").forEach((element) => {
        element.setAttribute("href", construireUrlSite(element.dataset.siteHref));
      });
    })();
  </script>

  <script src="../../../OBJETS/BLOCS/lightbox-information.js"></script>
  <script src="./choix-connexion.js"></script>
  <script src="../../../OBJETS/BLOCS/burger-public.js"></script>
  <script src="../../../OBJETS/BLOCS/footer-global.js"></script>
</body>
</html>
