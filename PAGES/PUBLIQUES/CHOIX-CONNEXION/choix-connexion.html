<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>Choix du type de compte - La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Choisir le type de compte pour se connecter à La Clé du Parc.">

  <!-- SITEBASE : config.js est chargé avant les scripts métier -->
  <script src="../../../config.js"></script>

  <script>
    (() => {
      const siteRootRelative = "../../../";
      const baseDepuisChemin = new URL(siteRootRelative, window.location.href);

      let siteBaseFallback = baseDepuisChemin.pathname.replace(/\/$/, "");

      if (siteBaseFallback === "/") {
        siteBaseFallback = "";
      }

      window.SITE_ROOT_RELATIVE = siteRootRelative;

      window.SITE_BASE = (
        window.SITE_CONFIG?.publicBaseUrl ||
        window.SITE_CONFIG?.siteBase ||
        siteBaseFallback ||
        ""
      ).replace(/\/$/, "");
    })();
  </script>

  <!-- CSS communs -->
  <link rel="stylesheet" href="../../../OBJETS/CSS/base.css">
  <link rel="stylesheet" href="../../../OBJETS/CSS/bandeau-et-burger.css">
  <link rel="stylesheet" href="../../../OBJETS/CSS/footer.css">
</head>

<body>
  <div class="site-page">

    <div id="bandeau-nav-container"></div>

    <main class="site-main">
      <section class="page-section page-section-large" aria-label="Choix du profil de connexion">
        <div class="page-container">
          <div class="page-content page-content-spaced">

            <h1 class="site-title">
              Connexion à mon compte
            </h1>

            <p class="site-subtitle">
              Ouvrez un nouvel onglet web pour utiliser plusieurs comptes en simultané.
            </p>

            <div class="page-actions page-actions-grid" aria-label="Choix du compte">
              <a
                class="button"
                href="../../../PAGES/PUBLIQUES/CONNEXION-MEMBRE/connexion-membre.html?source=connexion-choix"
                data-site-href="/PAGES/PUBLIQUES/CONNEXION-MEMBRE/connexion-membre.html?source=connexion-choix"
              >
                Invité ou Abonné
              </a>

              <a
                class="button"
                href="../../../PAGES/PUBLIQUES/CONNEXION-PARC/connexion-parc.html?source=connexion-choix"
                data-site-href="/PAGES/PUBLIQUES/CONNEXION-PARC/connexion-parc.html?source=connexion-choix"
              >
                Propriétaire de parc
              </a>

              <a
                class="button"
                href="../../../PAGES/PUBLIQUES/CONNEXION-COACH/connexion-coach.html?source=connexion-choix"
                data-site-href="/PAGES/PUBLIQUES/CONNEXION-COACH/connexion-coach.html?source=connexion-choix"
              >
                Coach d’activité
              </a>
            </div>

            <div class="page-invitation-compte" aria-label="Création d'un compte invité">
              <p>
                Vous n'avez pas de compte membre ?<br>
                Ouvrez votre compte invité(e), c'est gratuit.
              </p>

              <p>
                <a
                  class="lien-action-secondaire"
                  href="../../../PAGES/PUBLIQUES/INSCRIPTION-MEMBRE/inscription-membre.html?source=connexion-choix"
                  data-site-href="/PAGES/PUBLIQUES/INSCRIPTION-MEMBRE/inscription-membre.html?source=connexion-choix"
                >
                  Ouvrir mon compte invité
                </a>
              </p>
            </div>

          </div>
        </div>
      </section>
    </main>

    <div id="footer-container"></div>

  </div>

  <script>
    (() => {
      const siteBase = (
        window.SITE_BASE ||
        window.SITE_CONFIG?.publicBaseUrl ||
        window.SITE_CONFIG?.siteBase ||
        ""
      ).replace(/\/$/, "");

      const siteRootRelative = window.SITE_ROOT_RELATIVE || "../../../";

      function construireUrlSite(chemin) {
        if (!chemin) return chemin;

        if (
          chemin.startsWith("#") ||
          chemin.startsWith("mailto:") ||
          chemin.startsWith("tel:") ||
          chemin.startsWith("http://") ||
          chemin.startsWith("https://")
        ) {
          return chemin;
        }

        if (siteBase) {
          return chemin.startsWith("/")
            ? siteBase + chemin
            : siteBase + "/" + chemin.replace(/^\.\//, "");
        }

        return chemin.startsWith("/")
          ? siteRootRelative.replace(/\/?$/, "/") + chemin.replace(/^\//, "")
          : chemin;
      }

      window.construireUrlSite = construireUrlSite;

      document.querySelectorAll("[data-site-src]").forEach((element) => {
        element.setAttribute("src", construireUrlSite(element.dataset.siteSrc));
      });

      document.querySelectorAll("[data-site-href]").forEach((element) => {
        element.setAttribute("href", construireUrlSite(element.dataset.siteHref));
      });
    })();
  </script>

  <script src="../../../OBJETS/BLOCS/burger-public.js"></script>
  <script src="../../../OBJETS/BLOCS/footer-global.js"></script>
</body>
</html>
