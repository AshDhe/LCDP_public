<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>Mot de passe perdu membre - La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Recevoir un lien pour définir ou redéfinir votre mot de passe membre La Clé du Parc.">

  <script src="../../../config.js"></script>

  <script>
    (() => {
      const siteRootRelative = "../../../";
      const baseDepuisChemin = new URL(siteRootRelative, window.location.href);

      let siteBaseFallback = baseDepuisChemin.pathname.replace(/\/$/, "");

      if (siteBaseFallback === "/") {
        siteBaseFallback = "";
      }

      window.SITE_ROOT_RELATIVE = siteRootRelative;

      window.SITE_BASE = (
        window.SITE_CONFIG?.publicBaseUrl ||
        window.SITE_CONFIG?.PUBLIC_BASE ||
        window.SITE_CONFIG?.siteBase ||
        siteBaseFallback ||
        ""
      ).replace(/\/$/, "");
    })();
  </script>

  <link rel="stylesheet" href="../../../OBJETS/CSS/base.css">
  <link rel="stylesheet" href="../../../OBJETS/CSS/formulaire.css">
  <link rel="stylesheet" href="../../../OBJETS/CSS/lightbox-information.css">
</head>

<body>
  <div class="site-page">

    <div id="lightbox-information-container"></div>

    <main class="site-main">

      <section class="page-section page-section-large" aria-label="Mot de passe perdu membre">
        <div class="page-container">
          <div class="page-content page-content-spaced">

            <h1 class="titre-formulaire">
              Mot de passe perdu
            </h1>

            <p class="page-lead">
              Recevoir un lien pour définir ou redéfinir votre mot de passe.
            </p>

            <div class="formulaire-page">

              <form
                id="formulaire-mdp-perdu-membre"
                class="formulaire-inscription"
                novalidate
              >

                <div class="formulaire-champ">
                  <label for="emailmembre">
                    Votre email de compte membre
                  </label>

                  <input
                    type="email"
                    id="emailmembre"
                    name="emailmembre"
                    placeholder="Email"
                    autocomplete="email"
                    required
                  >
                </div>

                <div class="formulaire-actions">
                  <button
                    type="submit"
                    id="bouton-valider-formulaire"
                    class="button"
                  >
                    Envoyer
                  </button>
                </div>

              </form>

            </div>

          </div>
        </div>
      </section>

    </main>

  </div>

  <script src="../../../OBJETS/BLOCS/lightbox-information.js"></script>
  <script src="./mdp-perdu-membre.js"></script>
</body>
</html>
