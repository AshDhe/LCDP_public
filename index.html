<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Des parcs plein air d'exception près de chez vous. Vous ressourcer physiquement et mentalement.">

  <script src="./config.js"></script>

  <script>
    window.SITE_BASE =
      window.SITE_CONFIG?.publicBaseUrl ||
      window.SITE_CONFIG?.siteBase ||
      "";
  </script>

  <link rel="stylesheet" href="./OBJET/CSSBASE/cssbase.css" data-site-href="/OBJET/CSSBASE/cssbase.css">
  <link rel="stylesheet" href="./OBJET/BOX/01-box-affiche.css" data-site-href="/OBJET/BOX/01-box-affiche.css">
  <link rel="stylesheet" href="./OBJET/BOX/01-box-carrousel.css" data-site-href="/OBJET/BOX/01-box-carrousel.css">
  <link rel="stylesheet" href="./OBJET/BOX/01-box-text.css" data-site-href="/OBJET/BOX/01-box-text.css">
</head>

<body>
  <div class="lcdp-site-page">
    <main class="lcdp-site-main">
      <div id="lcdp-index-root"></div>
    </main>
  </div>

  <script>
    (() => {
      "use strict";

      const siteBase = (
        window.SITE_BASE ||
        window.SITE_CONFIG?.publicBaseUrl ||
        window.SITE_CONFIG?.siteBase ||
        ""
      ).replace(/\/$/, "");

      function construireUrlSite(chemin) {
        if (!chemin) return chemin;

        if (
          chemin.startsWith("#") ||
          chemin.startsWith("mailto:") ||
          chemin.startsWith("tel:") ||
          chemin.startsWith("http://") ||
          chemin.startsWith("https://") ||
          chemin.startsWith("data:")
        ) {
          return chemin;
        }

        if (siteBase) {
          return chemin.startsWith("/")
            ? siteBase + chemin
            : siteBase + "/" + chemin.replace(/^\.\//, "");
        }

        return chemin.startsWith("/") ? "." + chemin : chemin;
      }

      function construireUrlPublique(chemin) {
        if (typeof window.SITE_CONFIG?.publicUrl === "function") {
          return window.SITE_CONFIG.publicUrl(chemin);
        }

        return construireUrlSite(chemin);
      }

      function appliquerRoutesSite(racine = document) {
        racine.querySelectorAll("[data-site-href]").forEach((element) => {
          element.setAttribute("href", construireUrlSite(element.dataset.siteHref));
        });

        racine.querySelectorAll("[data-site-src]").forEach((element) => {
          element.setAttribute("src", construireUrlSite(element.dataset.siteSrc));
        });
      }

      function lireCookie(nom) {
        return document.cookie
          .split(";")
          .map((part) => part.trim())
          .some((part) => part.startsWith(nom + "="));
      }

      async function chargerFragment(chemin) {
        const reponse = await fetch(construireUrlSite(chemin), {
          method: "GET",
          credentials: "same-origin",
          cache: "no-cache"
        });

        if (!reponse.ok) {
          throw new Error("Fragment introuvable : " + chemin);
        }

        const html = await reponse.text();
        const template = document.createElement("template");
        template.innerHTML = html.trim();

        return template.content.cloneNode(true);
      }

      function chargerScriptUneFois(chemin) {
        const src = construireUrlSite(chemin);

        if (document.querySelector(`script[data-lcdp-script="${chemin}"]`)) {
          return Promise.resolve();
        }

        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.defer = true;
          script.dataset.lcdpScript = chemin;
          script.onload = resolve;
          script.onerror = () => reject(new Error("Script introuvable : " + chemin));
          document.body.appendChild(script);
        });
      }

      async function afficherAfficheAccueil() {
        const root = document.getElementById("lcdp-index-root");
        root.innerHTML = "";

        const affiche = await chargerFragment("/OBJET/BOX/01-box-affiche.html");
        root.appendChild(affiche);

        const box = root.querySelector("[data-lcdp-box-affiche]");

        if (!box) {
          throw new Error("Structure affiche d'accueil incomplète.");
        }

        box.querySelector("[data-lcdp-affiche-title]").textContent = "La Clé du Parc";

        box.querySelector("[data-lcdp-affiche-lead]").textContent =
          "Des parcs plein air d’exception, proches de vous, pour vous ressourcer toute l’année.";

        const carrouselSlot = box.querySelector("[data-lcdp-affiche-carrousel-slot]");
        const carrousel = await chargerFragment("/OBJET/BOX/01-box-carrousel.html");
        carrouselSlot.appendChild(carrousel);

        const carrouselElement = carrouselSlot.querySelector("[data-lcdp-box-carousel]");
        carrouselElement.querySelector("[data-lcdp-carousel-title]").textContent =
          "Découvrir l’esprit du club";

        const liste = carrouselElement.querySelector("[data-lcdp-carousel-list]");

        const imagesCarrousel = [
          /*
            Ajouter ici les vrais fichiers présents dans :
            /OBJET/IMAG/CARROUSEL/AFFICHE-ACCUEIL/

            Exemple :
            {
              src: "/OBJET/IMAG/CARROUSEL/AFFICHE-ACCUEIL/image-01.jpg",
              alt: "Parc privé La Clé du Parc"
            }
          */
        ];

        imagesCarrousel.forEach((image) => {
          const figure = document.createElement("figure");
          figure.className = "lcdp-box-carousel__item";

          const img = document.createElement("img");
          img.className = "lcdp-box-carousel__image";
          img.src = construireUrlSite(image.src);
          img.alt = image.alt || "";
          img.loading = "lazy";
          img.decoding = "async";

          figure.appendChild(img);
          liste.appendChild(figure);
        });

        await chargerScriptUneFois("/OBJET/BOX/01-box-carrousel.js");

        if (typeof window.LCDP_initialiserCarrousels === "function") {
          window.LCDP_initialiserCarrousels(carrouselSlot);
        }

        const textSlot = box.querySelector("[data-lcdp-affiche-text-slot]");
        const boxText = await chargerFragment("/OBJET/BOX/01-box-text.html");
        textSlot.appendChild(boxText);

        const boxTextElement = textSlot.querySelector("[data-lcdp-boxtext]");
        boxTextElement.querySelector("[data-lcdp-boxtext-title]").textContent =
          "Un club pour respirer autrement";

        boxTextElement.querySelector("[data-lcdp-boxtext-content]").innerHTML =
          "<p>La Clé du Parc permet à ses membres de se retrouver seuls ou en petit groupe dans des parcs privés sélectionnés.</p><p>Le club propose un cadre simple, apaisant et vivant pour des activités culturelles, sportives, artistiques ou conviviales.</p>";

        box.querySelector("[data-lcdp-box-affiche-close]").addEventListener("click", () => {
          box.remove();
        });

        box.addEventListener("click", (event) => {
          if (event.target === box) {
            box.remove();
          }
        });

        appliquerRoutesSite(root);
      }

      appliquerRoutesSite(document);

      if (lireCookie("userapp")) {
        window.location.href = construireUrlPublique("/ESPACE-PUBLIC/accueil-public.html");
        return;
      }

      afficherAfficheAccueil().catch((erreur) => {
        console.error(erreur);
      });
    })();
  </script>
</body>
</html>
