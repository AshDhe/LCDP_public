<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Des parcs plein air d'exception près de chez vous. Vous ressourcer physiquement et mentalement.">

  <!-- SITEBASE : config.js est chargé avant les scripts métier -->
  <script src="./config.js"></script>

  <script>
    window.SITE_BASE =
      window.SITE_CONFIG?.publicBaseUrl ||
      window.SITE_CONFIG?.siteBase ||
      "";
  </script>

  <!-- CSS : base commune, bandeau/burger, footer, puis CSS spécifique index -->
  <link rel="stylesheet" href="./OBJETS/CSS/base.css">
  <link rel="stylesheet" href="./OBJETS/CSS/bandeau-et-burger.css">
  <link rel="stylesheet" href="./OBJETS/CSS/footer.css">
  <link rel="stylesheet" href="./OBJETS/CSS/index.css">
</head>

<body>
  <div class="site-page">

    <div id="bandeau-nav-container">
      <header class="site-header">
        <div class="site-header-inner">
          <a
            href="./index.html"
            class="site-logo"
            data-site-href="/index.html"
          >
            <img
              class="site-logo-img"
              src="./OBJETS/IMAGES/LOGO/logo-bandeau-96.webp"
              data-site-src="/OBJETS/IMAGES/LOGO/logo-bandeau-96.webp"
              width="96"
              height="96"
              alt=""
              aria-hidden="true"
              loading="eager"
              fetchpriority="high"
              decoding="async"
            >
            <span>La Clé du Parc</span>
          </a>

          <button
            class="burger-button"
            type="button"
            aria-label="Ouvrir le menu"
            aria-expanded="false"
            aria-controls="burger-nav-public"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>

          <nav
            id="burger-nav-public"
            class="burger-nav burger-nav-public"
            aria-label="Navigation publique"
          >
            <a
              href="./index.html?source=menu"
              data-site-href="/index.html?source=menu"
            >Accueil</a>

            <a
              href="./PAGES/PUBLIQUES/CHOIX-CONNEXION/choix-connexion.html?source=menu-mon-compte"
              data-site-href="/PAGES/PUBLIQUES/CHOIX-CONNEXION/choix-connexion.html?source=menu-mon-compte"
              id="lien-mon-compte-public"
            >
              Mon compte
            </a>

            <a
              href="./PAGES/PUBLIQUES/ACTUALITES/actualites.html?source=menu"
              data-site-href="/PAGES/PUBLIQUES/ACTUALITES/actualites.html?source=menu"
            >Actualités</a>

            <a
              href="./PAGES/PUBLIQUES/INSCRIPTION-MEMBRE/inscription-membre.html?source=menu"
              data-site-href="/PAGES/PUBLIQUES/INSCRIPTION-MEMBRE/inscription-membre.html?source=menu"
            >Être invité(e)</a>

            <a
              href="./PAGES/PUBLIQUES/LA-CLE-DU-PARC/la-cle-du-parc.html?source=menu"
              data-site-href="/PAGES/PUBLIQUES/LA-CLE-DU-PARC/la-cle-du-parc.html?source=menu"
            >Le club</a>
          </nav>
        </div>
      </header>
    </div>

    <main class="site-main">
      <section class="page-section index-section" aria-label="Accueil public">
        <div class="page-container">
          <div class="page-content index-content">

            <img
              src="./OBJETS/IMAGES/LOGO/logo.png"
              alt="Logo La Clé du Parc"
              class="logo-page"
              loading="eager"
              fetchpriority="high"
              decoding="async"
            >

            <h2 class="site-title index-title">
              <span>Des parcs plein air d'exception<br>
              proches de vous</span>
              <span>Pour se ressourcer toute l'année</span>
            </h2>

            <div class="page-actions index-actions" aria-label="Accès principaux">
              <a
                class="button"
                href="./PAGES/PUBLIQUES/INSCRIPTION-MEMBRE/inscription-membre.html"
                data-site-href="/PAGES/PUBLIQUES/INSCRIPTION-MEMBRE/inscription-membre.html"
              >
                Être invité(e)
              </a>

              <a
                class="button"
                href="./PAGES/PUBLIQUES/CHOIX-CONNEXION/choix-connexion.html"
                data-site-href="/PAGES/PUBLIQUES/CHOIX-CONNEXION/choix-connexion.html"
              >
                Me connecter
              </a>

              <a
                class="button"
                href="./PAGES/PUBLIQUES/ACTUALITES/actualites.html"
                data-site-href="/PAGES/PUBLIQUES/ACTUALITES/actualites.html"
              >
                Les actualités
              </a>

              <a
                class="button"
                href="./PAGES/PUBLIQUES/LA-CLE-DU-PARC/la-cle-du-parc.html"
                data-site-href="/PAGES/PUBLIQUES/LA-CLE-DU-PARC/la-cle-du-parc.html"
              >
                Découvrir le club
              </a>
            </div>

          </div>
        </div>
      </section>
    </main>

    <div id="footer-container"></div>

  </div>

  <script>
    (() => {
      const siteBase = (
        window.SITE_BASE ||
        window.SITE_CONFIG?.publicBaseUrl ||
        window.SITE_CONFIG?.siteBase ||
        ""
      ).replace(/\/$/, "");

      function construireUrlSite(chemin) {
        if (!chemin) return chemin;

        if (
          chemin.startsWith("#") ||
          chemin.startsWith("mailto:") ||
          chemin.startsWith("tel:") ||
          chemin.startsWith("http://") ||
          chemin.startsWith("https://")
        ) {
          return chemin;
        }

        if (siteBase) {
          return chemin.startsWith("/")
            ? siteBase + chemin
            : siteBase + "/" + chemin.replace(/^\.\//, "");
        }

        return chemin.startsWith("/") ? "." + chemin : chemin;
      }

      document.querySelectorAll("[data-site-href]").forEach((element) => {
        element.setAttribute("href", construireUrlSite(element.dataset.siteHref));
      });

      document.querySelectorAll("[data-site-src]").forEach((element) => {
        element.setAttribute("src", construireUrlSite(element.dataset.siteSrc));
      });
    })();
  </script>

  <script src="./OBJETS/BLOCS/burger-public.js"></script>
  <script src="./OBJETS/BLOCS/footer-global.js"></script>
</body>
</html>
