<div
  class="lightbox-overlay"
  id="lightbox-information"
  role="dialog"
  aria-modal="true"
  aria-labelledby="lightbox-information-title"
  aria-describedby="lightbox-information-message"
  hidden
>
  <div class="lightbox-box">
    <h2 id="lightbox-information-title"></h2>

    <p id="lightbox-information-message"></p>

    <button type="button" class="button" id="lightbox-information-ok">
      OK
    </button>
  </div>
</div>
